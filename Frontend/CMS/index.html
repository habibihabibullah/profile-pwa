<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <a href="../profile/index.html" class="btn-back">↩ Kembali ke Profil</a>
    <div class="header">
      <h1>Content Management System</h1>
      <p>Kelola artikel dengan mudah & cepat</p>
    </div>

    <form id="articleForm" class="card">
      <input id="title" type="text" placeholder="Judul artikel" required>
      <textarea id="content" placeholder="Isi artikel..." required></textarea>
      <button type="submit">+ Tambah Artikel</button>
    </form>

    <p id="errorMsg"></p>

    <div id="articleList"></div>

  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modalText"></p>
      <div class="modal-buttons">
        <button id="confirmBtn">Ya, Hapus</button>
        <button id="cancelBtn">Batal</button>
      </div>
    </div>
  </div>

</body>
</html>
